name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff==0.4.4
      - run: ruff check src/ tests/ dags/

  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements-infra.txt
          pip install scipy lightgbm imbalanced-learn mlflow scikit-learn httpx plotly pandas streamlit
      - name: Run tests
        run: pytest tests/ -v --tb=short

  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t credit-risk-api:ci .
      - name: Build dashboard image
        run: docker build -f docker/Dockerfile.dashboard -t credit-risk-dashboard:ci .
