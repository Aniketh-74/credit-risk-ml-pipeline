name: Deploy

on:
  push:
    branches: [master]

env:
  GCP_REGION: us-central1
  API_SERVICE: credit-risk-api
  DASHBOARD_SERVICE: credit-risk-dashboard
  IMAGE_API: gcr.io/${{ secrets.GCP_PROJECT_ID }}/credit-risk-api
  IMAGE_DASHBOARD: gcr.io/${{ secrets.GCP_PROJECT_ID }}/credit-risk-dashboard

jobs:
  deploy-api:
    name: Build + deploy FastAPI to Cloud Run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build and push API image
        run: |
          docker build -f docker/Dockerfile.api \
            -t ${{ env.IMAGE_API }}:${{ github.sha }} \
            -t ${{ env.IMAGE_API }}:latest .
          docker push ${{ env.IMAGE_API }}:${{ github.sha }}
          docker push ${{ env.IMAGE_API }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.API_SERVICE }} \
            --image ${{ env.IMAGE_API }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --min-instances 1 \
            --set-env-vars APP_DB_URL=${{ secrets.APP_DB_URL }},MLFLOW_TRACKING_URI=${{ secrets.MLFLOW_TRACKING_URI }}

  deploy-dashboard:
    name: Build + deploy Streamlit to Cloud Run
    runs-on: ubuntu-latest
    needs: deploy-api
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build and push dashboard image
        run: |
          docker build -f docker/Dockerfile.dashboard \
            -t ${{ env.IMAGE_DASHBOARD }}:${{ github.sha }} \
            -t ${{ env.IMAGE_DASHBOARD }}:latest .
          docker push ${{ env.IMAGE_DASHBOARD }}:${{ github.sha }}
          docker push ${{ env.IMAGE_DASHBOARD }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.DASHBOARD_SERVICE }} \
            --image ${{ env.IMAGE_DASHBOARD }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --min-instances 1 \
            --port 8501 \
            --set-env-vars APP_DB_URL=${{ secrets.APP_DB_URL }},MLFLOW_TRACKING_URI=${{ secrets.MLFLOW_TRACKING_URI }}
