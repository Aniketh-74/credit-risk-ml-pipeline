# Alembic configuration for credit-risk-ml-pipeline.
#
# The database URL is NOT stored here — it is read from the APP_DB_URL
# environment variable in env.py. This file is safe to commit.

[alembic]
script_location = db/migrations
file_template = %%(rev)s_%%(slug)s
prepend_sys_path = .

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
